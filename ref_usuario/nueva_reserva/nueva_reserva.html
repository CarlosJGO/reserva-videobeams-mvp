<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Reserva</title>

    <link rel="stylesheet" href="css/nueva_reserva.css">
</head>

<body>

    <div class="fondo-animado"></div>

    <div class="contenedor-form">

        <div class="formulario">
            <div class="encabezado-form">
                <div class="icono-form">📋</div>
                <h1>Solicitar Reserva</h1>
                <p>Completa el formulario para reservar un videobeam</p>
            </div>

            <form id="formReserva" class="form-contenido">

                <div class="grupo">
                    <label for="videobeam">
                        <span class="icono-campo">🎬</span> Videobeam
                    </label>
                    <select id="videobeam" name="videobeam_id" required>
                        <option value="">Seleccione un videobeam</option>
                    </select>
                </div>

                <div class="grupo">
                    <label for="fecha">
                        <span class="icono-campo">📅</span> Fecha
                    </label>
                    <input type="date" id="fecha" name="fecha" required>
                </div>

                <div class="fila-dos-columnas">
                    <div class="grupo">
                        <label for="hora_inicio">
                            <span class="icono-campo">🕐</span> Hora inicio
                        </label>
                        <input type="time" id="hora_inicio" name="hora_inicio" required>
                    </div>

                    <div class="grupo">
                        <label for="hora_fin">
                            <span class="icono-campo">🕐</span> Hora fin
                        </label>
                        <input type="time" id="hora_fin" name="hora_fin" required>
                    </div>
                </div>

                <button type="submit" class="btn-enviar">
                    ✓ Solicitar Reserva
                </button>

            </form>

            <div id="mensaje" class="mensaje"></div>
        </div>

    </div>

    <script src="js/nueva_reserva.js"></script>

</body>

</html>
