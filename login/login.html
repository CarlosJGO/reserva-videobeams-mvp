<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Sistema de Reserva de Videobeams</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="login.css">
</head>

<body>

    <div class="contenedor-principal">
        <!-- Panel izquierdo con branding -->
        <div class="panel-izquierdo">
            <div class="contenido-branding">
                <div class="logo-contenedor">
                    <i class="fas fa-video"></i>
                </div>
                <h2>Sistema de Reserva</h2>
                <p>Gestiona tus reservas de videobeams de forma fácil y rápida</p>
                <ul class="caracteristicas">
                    <li><i class="fas fa-check-circle"></i> Reservas en tiempo real</li>
                    <li><i class="fas fa-check-circle"></i> Control de devoluciones</li>
                    <li><i class="fas fa-check-circle"></i> Seguimiento de entregas</li>
                </ul>
            </div>
        </div>

        <!-- Panel derecho con formulario -->
        <div class="panel-derecho">
            <div class="contenedor-formulario">
                <div class="header-login">
                    <h1>Bienvenido</h1>
                    <p>Inicia sesión en tu cuenta</p>
                </div>

                <form id="formLogin" class="formulario-login">

                    <div class="grupo-campo">
                        <div class="campo-input">
                            <i class="fas fa-envelope"></i>
                            <input
                                type="email"
                                id="correo"
                                name="correo"
                                placeholder="Correo electrónico"
                                required
                                autocomplete="email">
                            <label for="correo">Correo electrónico</label>
                        </div>
                    </div>

                    <div class="grupo-campo">
                        <div class="campo-input">
                            <i class="fas fa-lock"></i>
                            <input
                                type="password"
                                id="password"
                                name="password"
                                placeholder="Contraseña"
                                required
                                autocomplete="current-password">
                            <label for="password">Contraseña</label>
                            <button type="button" class="btn-mostrar-password" id="togglePassword">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="opciones-recordar">
                        <label class="checkbox-recordar">
                            <input type="checkbox" id="recordarme" name="recordarme">
                            <span>Recuérdame</span>
                        </label>
                        <a href="#" class="enlace-olvide">¿Olvidaste tu contraseña?</a>
                    </div>

                    <button type="submit" class="btn-ingresar">
                        <span>Ingresar</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>

                </form>

                <div id="mensaje" class="mensaje-alerta"></div>

                <div class="footer-login">
                    <p>¿No tienes cuenta? <a href="#">Contacta al administrador</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="login.js"></script>

</body>

</html>
