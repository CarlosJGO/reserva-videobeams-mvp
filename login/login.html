<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" href="login.css">
</head>

<body>

    <div class="contenedor">

        <h1>Iniciar Sesión</h1>

        <form id="formLogin">

            <div class="grupo">
                <label for="correo">
                    Correo
                </label>

                <input
                    type="email"
                    id="correo"
                    name="correo"
                    required>
            </div>

            <div class="grupo">
                <label for="password">
                    Contraseña
                </label>

                <input
                    type="password"
                    id="password"
                    name="password"
                    required>
            </div>

            <button type="submit">
                Ingresar
            </button>

        </form>

        <div id="mensaje"></div>

    </div>

    <script src="login.js"></script>

</body>

</html>
